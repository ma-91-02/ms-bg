server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # ضغط الأصول النصية
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # رؤوس أمان أساسية
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # أصول مبنية بأسماء تحمل بصمة المحتوى — تخزين طويل الأمد
    location /admin/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # لا تخزّن ملف الدخول حتى يصل أي إصدار جديد فورًا
    location = /admin/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # اللوحة تُقدَّم كاملةً تحت /admin؛ التوجيه من جانب العميل يعني أن
    # أي مسار فرعي غير موجود على القرص يعود إلى index.html
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # فحص صحة الحاوية — البوابة وحدها من يصل إلى الجذر
    location = / {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
