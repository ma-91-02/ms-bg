# ============================================================================
#  تجاوزات التشغيل المحلي فقط
#
#      docker compose -f docker-compose.coolify.yml -f docker-compose.local.yml up -d
#
#  فُصلت عن ملف Coolify لأن نشر منفذ على الخادم يصطدم بما هو محجوز
#  هناك ويُفشل النشر — الوكيل العكسي في Coolify يوجّه عبر الشبكة
#  الداخلية ولا يحتاج منفذًا منشورًا.
# ============================================================================

services:
  gateway:
    ports:
      - '${GATEWAY_PORT:-8080}:80'

  postgres:
    # للاطلاع على قاعدة البيانات محليًا؛ 5432 محجوز لمشروع آخر
    ports:
      - '${POSTGRES_PORT:-5434}:5432'
