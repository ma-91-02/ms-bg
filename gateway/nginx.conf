# ============================================================================
#  البوابة — كل الخدمات خلف نطاق واحد
#
#      /            → تطبيق المستخدم (PWA)
#      /install     → صفحة شرح التثبيت (مسار داخل الـ PWA)
#      /admin       → لوحة التحكم
#      /api         → الخلفية
#      /uploads     → صور الإعلانات (تُقدَّم من الخلفية)
#
#  الفائدة الأهم بعد بساطة النطاق الواحد: تختفي CORS تمامًا لأن كل
#  الطلبات تصير من نفس الأصل — فلا حاجة لضبط CORS_ORIGINS ولا لطلبات
#  OPTIONS تمهيدية.
# ============================================================================

upstream backend_upstream {
    server backend:3001;
}

upstream admin_upstream {
    server admin:80;
}

upstream pwa_upstream {
    server pwa:80;
}

server {
    listen 80;
    server_name _;

    # الصور المرفوعة قد تكون كبيرة
    client_max_body_size 12M;

    gzip on;
    gzip_proxied any;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- الخلفية ---
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # الخلفية خلف TLS تُنهيه Coolify — هذا الرأس يخبرها بذلك
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /health {
        proxy_pass http://backend_upstream/health;
        access_log off;
    }

    # --- لوحة التحكم ---
    # التطبيق مبنيّ بـ homepage=/admin فأصوله تحت /admin/ أيضًا،
    # ولا يحتاج إعادة كتابة المسار
    location /admin {
        proxy_pass http://admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- تطبيق المستخدم ---
    # عامل الخدمة يجب ألا يُخزَّن، وإلا بقي إصدار قديم يتحكّم بالصفحة
    # بعد كل نشر فلا تصل التحديثات
    location = /sw.js {
        proxy_pass http://pwa_upstream/sw.js;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    location / {
        proxy_pass http://pwa_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
