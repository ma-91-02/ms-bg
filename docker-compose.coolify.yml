# ============================================================================
#  نشر على Coolify — كل الخدمات خلف نطاق واحد
#
#      example.com/          → تطبيق المستخدم (PWA)
#      example.com/install   → صفحة شرح التثبيت
#      example.com/admin     → لوحة التحكم
#      example.com/api       → الخلفية
#
#  البوابة وحدها تحمل نطاقًا عامًا؛ البقية على الشبكة الداخلية فقط.
#  لهذا فائدة أمنية مباشرة: قاعدة البيانات والخلفية غير مكشوفتين للإنترنت.
#  وفائدة عملية: تختفي CORS تمامًا لأن كل الطلبات من نفس الأصل.
#
#  المتطلّب الوحيد قبل النشر: استنساخ مستودع التطبيق بجانب هذا المستودع
#      git clone https://github.com/ma-91-02/ms-mobile-app ../ms-mobile-app
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      # يجب أن يبقى false — الخادم يرفض الإقلاع لو كان true مع NODE_ENV=production
      DEMO_MODE: 'false'
      # يطابق وحدة التخزين أدناه — دون ضبطه يُشتق المسار من موقع الملف
      UPLOADS_DIR: /app/uploads
      # نطاق واحد فلا حاجة لقائمة أصول مسموحة؛ تُترك للتوافق فقط
      CORS_ORIGINS: ${APP_URL}
    volumes:
      # الصور المرفوعة يجب أن تنجو من إعادة النشر
      - uploads:/app/uploads

  admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # فارغ عمدًا: نطاق واحد، فالمسار النسبي /api هو الصحيح
        REACT_APP_API_URL: ''
    restart: unless-stopped
    depends_on:
      - backend

  pwa:
    build:
      context: ../ms-mobile-app
      dockerfile: Dockerfile
      args:
        # فارغ عمدًا للسبب نفسه
        EXPO_PUBLIC_API_URL: ''
    restart: unless-stopped
    depends_on:
      - backend

  # الخدمة الوحيدة المكشوفة على الإنترنت
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - admin
      - pwa
    environment:
      SERVICE_FQDN_GATEWAY_80: /
    # للتشغيل المحلي فقط — في Coolify يتولى الوكيل العكسي المنفذ
    ports:
      - '${GATEWAY_PORT:-8080}:80'

volumes:
  pgdata:
  uploads:
